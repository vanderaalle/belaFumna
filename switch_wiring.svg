<!-- legend -->
<g id="node16" class="node">
<title>legend</title>
<polygon fill="#fffbe6" stroke="black" points="1359,-473 1048,-473 1048,-286 1365,-286 1365,-467 1359,-473"/>
<polyline fill="none" stroke="black" points="1359,-473 1359,-467 "/>
<polyline fill="none" stroke="black" points="1365,-467 1359,-467 "/>
<text text-anchor="start" x="1056" y="-461" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444">Solder connections (repeat for each of the 6 switches):</text>
<text text-anchor="start" x="1056" y="-438" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;① &#160;5V rail &#160;→ &#160;100Ω resistor (one leg)</text>
<text text-anchor="start" x="1056" y="-427" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;② &#160;100Ω resistor (other leg) &#160;→ &#160;Pole 1 &#160;NO</text>
<text text-anchor="start" x="1056" y="-416" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;③ &#160;Pole 1 &#160;COM &#160;→ &#160;LED+ terminal on switch body</text>
<text text-anchor="start" x="1056" y="-405" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;④ &#160;LED− terminal &#160;→ &#160;GND</text>
<text text-anchor="start" x="1056" y="-394" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;⑤ &#160;3.3V rail &#160;→ &#160;Pole 2 &#160;NC</text>
<text text-anchor="start" x="1056" y="-383" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;⑥ &#160;Pole 2 &#160;COM &#160;→ &#160;Bela DigitalIn pin</text>
<text text-anchor="start" x="1056" y="-372" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;⑦ &#160;Pole 2 &#160;COM &#160;→ &#160;10kΩ resistor &#160;→ &#160;GND</text>
<text text-anchor="start" x="1056" y="-349" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444">Leave free: &#160;Pole 1 NC, &#160;Pole 2 NO, &#160;all of Pole 3</text>
<text text-anchor="start" x="1056" y="-326" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444">How it works:</text>
<text text-anchor="start" x="1056" y="-315" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;Not latched: &#160;NC&#45;COM closed &#160;→ &#160;3.3V on pin &#160;→ &#160;sw = 1&#45;1 = 0 &#160;→ &#160;effect OFF</text>
<text text-anchor="start" x="1056" y="-304" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;Latched: &#160;&#160;&#160;&#160;&#160;NC&#45;COM opens &#160;&#160;→ &#160;pull&#45;down &#160;&#160;&#160;→ &#160;0V on pin &#160;→ &#160;sw = 1&#45;0 = 1 &#160;→ &#160;effect ON</text>
<text text-anchor="start" x="1056" y="-293" font-family="Ubuntu Condensed" font-size="10.00" fill="#444444"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;NO&#45;COM closes &#160;→ &#160;current through LED &#160;→ &#160;LED ON</text>
</g>
